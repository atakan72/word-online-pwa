<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Online – Offline</title>
  <style>
    body { margin:0; min-height:100vh; background:#2B579A;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      color:#fff; text-align:center; padding:40px; }
    .icon { font-size:3.5rem; margin-bottom:20px; }
    h1 { font-size:1.6rem; margin-bottom:10px; }
    p  { opacity:.7; max-width:320px; line-height:1.6; }
    button { margin-top:24px; background:rgba(255,255,255,0.18);
      border:1px solid rgba(255,255,255,0.4); color:#fff;
      padding:11px 26px; border-radius:8px; font-size:.95rem; font-weight:600; cursor:pointer; }
    button:hover { background:rgba(255,255,255,0.28); }
  </style>
</head>
<body>
  <div class="icon">📴</div>
  <h1>Kein Internet</h1>
  <p>Verbinde dich mit dem Internet um Word Online zu nutzen.</p>
  <button onclick="location.reload()">Erneut versuchen</button>
</body>
</html>
